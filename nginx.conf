server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        # Isso é vital para o React Router (não dar 404 ao atualizar a página)
        try_files $uri $uri/ /index.html;
    }

    # Configuração de Cache para o PWA (Service Worker)
    location /sw.js {
        add_header Cache-Control "no-cache";
        proxy_cache_bypass $http_pragma;
        proxy_cache_revalidate on;
        expires off;
        access_log off;
    }
}